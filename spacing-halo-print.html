<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signature halo</title>
<link rel="stylesheet" href="_card.css">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  .page {
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    box-sizing: border-box;
  }

  .card-wrap {
    width: 100%;
    max-width: 1100px;
    aspect-ratio: 16 / 9;
    position: relative;
  }

  @page {
    size: landscape;
    margin: 0.5cm;
  }

  @media print {
    html, body { background: #ffffff; }
    .page { height: auto; min-height: 0; padding: 0; }
    .card-wrap { max-width: none; width: 100%; height: 100%; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="card-wrap">
    <div class="card" style="padding: 0; position: relative; overflow: hidden; height: 100%; background: var(--paper); border-radius: 16px;">
      <div style="position: absolute; inset: 0; background:
          radial-gradient(70% 70% at 50% 100%,
            rgba(245,192, 68, 0.62) 0%,
            rgba(244,163, 78, 0.52) 22%,
            rgba(241,122, 59, 0.42) 42%,
            rgba(237, 90, 42, 0.28) 62%,
            rgba(216, 82,122, 0.14) 80%,
            transparent 100%);
          filter: blur(20px); pointer-events: none;"></div>
      <div style="position: relative; z-index: 2; padding: 56px 64px 64px; display: flex; flex-direction: column; gap: 28px; align-items: flex-start; height: 100%; box-sizing: border-box; justify-content: center;">
        <p class="eyebrow" style="margin: 0;">Signature halo · Amber → Sunset → Solar → Magenta</p>
        <p style="font-family: var(--font-display); font-weight: 400; font-size: 88px; letter-spacing: -1.8px; line-height: 1.02; color: var(--ink); margin: 0; max-width: 720px;">Your brand,<br>down to the pixel.</p>
        <p style="font-family: var(--font-body); font-weight: 300; font-size: 18px; color: var(--fg-3); margin: 0; max-width: 540px;">600–700px radial blur, sits behind hero headlines. The warm bloom is the brand.</p>
      </div>
    </div>
  </div>
</div>

<script>
  (async () => {
    if (document.fonts && document.fonts.ready) {
      try { await document.fonts.ready; } catch (e) {}
    }
    await new Promise(r => setTimeout(r, 500));
    window.print();
  })();
</script>

</body>
</html>
