<!DOCTYPE html>
<!-- @dsCard group="Components" name="Badges & eyebrows" subtitle="Bordered pill, filled badge, status chips" viewport="700x200" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Badges</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>

<div class="card col" style="gap: 18px;">
  <p class="eyebrow">Eyebrows · bordered pill + filled badge + table status</p>
  <div class="row wrap" style="gap: 12px;">
    <span style="display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--hairline);"><span style="width:10px;height:10px;border-radius:2px;background:var(--orchid);"></span><span style="font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.75px; text-transform: uppercase; color: var(--ink);">Analyze</span></span>
    <span style="display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--hairline);"><span style="width:10px;height:10px;border-radius:2px;background:var(--mint);"></span><span style="font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.75px; text-transform: uppercase; color: var(--ink);">Store</span></span>
    <span style="display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 999px; background: var(--sand);"><span style="font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.75px; text-transform: uppercase; color: var(--ink);">Insights</span></span>
    <span style="display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 999px; background: var(--mint);"><span style="font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.75px; text-transform: uppercase; color: var(--ink);">Now in private beta</span></span>
  </div>
  <div class="row wrap" style="gap: 8px;">
    <span style="display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 8px; background: var(--orchid); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.75px; text-transform: uppercase; color: var(--ink);">Generated</span><span style="display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 8px; background: var(--mint); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.75px; text-transform: uppercase; color: var(--ink);">Approved</span><span style="display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 8px; background: var(--sky); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.75px; text-transform: uppercase; color: var(--ink);">In review</span><span style="display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 8px; background: var(--peach); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.75px; text-transform: uppercase; color: var(--ink);">Needs work</span>
  </div>
</div>

</body>
</html>
