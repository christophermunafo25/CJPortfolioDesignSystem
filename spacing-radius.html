<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Radius scale" subtitle="Card 20 / Card-sm 16 / Icon 12 / Input 10 / Button 8 / Pill / Dot" viewport="700x240" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Radius scale</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>

<div class="card col" style="gap: 18px;">
  <p class="eyebrow">Radius · never mix scales on one component</p>
  <div class="row wrap" style="gap: 28px; align-items: flex-end;">
    
      <div class="col" style="gap: 8px; align-items: center;">
        <div style="width: 92px; height: 92px; border-radius: 20px; background: var(--paper-warm); border: 1px solid var(--hairline);"></div>
        <div class="col" style="gap: 1px; align-items: center;">
          <span class="token-label" style="font-size: 13px;">Card</span>
          <span class="token-hex">20px</span>
        </div>
      </div>
    
      <div class="col" style="gap: 8px; align-items: center;">
        <div style="width: 78px; height: 78px; border-radius: 16px; background: var(--paper-warm); border: 1px solid var(--hairline);"></div>
        <div class="col" style="gap: 1px; align-items: center;">
          <span class="token-label" style="font-size: 13px;">Card sm</span>
          <span class="token-hex">16px</span>
        </div>
      </div>
    
      <div class="col" style="gap: 8px; align-items: center;">
        <div style="width: 56px; height: 56px; border-radius: 12px; background: var(--orchid); "></div>
        <div class="col" style="gap: 1px; align-items: center;">
          <span class="token-label" style="font-size: 13px;">Icon</span>
          <span class="token-hex">12px</span>
        </div>
      </div>
    
      <div class="col" style="gap: 8px; align-items: center;">
        <div style="width: 56px; height: 56px; border-radius: 10px; background: var(--paper-warm); border: 1px solid var(--hairline);"></div>
        <div class="col" style="gap: 1px; align-items: center;">
          <span class="token-label" style="font-size: 13px;">Input</span>
          <span class="token-hex">10px</span>
        </div>
      </div>
    
      <div class="col" style="gap: 8px; align-items: center;">
        <div style="width: 56px; height: 56px; border-radius: 8px; background: var(--ink); "></div>
        <div class="col" style="gap: 1px; align-items: center;">
          <span class="token-label" style="font-size: 13px;">Button</span>
          <span class="token-hex">8px</span>
        </div>
      </div>
    
      <div class="col" style="gap: 8px; align-items: center;">
        <div style="width: 56px; height: 56px; border-radius: 999px; background: var(--mint); "></div>
        <div class="col" style="gap: 1px; align-items: center;">
          <span class="token-label" style="font-size: 13px;">Pill</span>
          <span class="token-hex">999px</span>
        </div>
      </div>
    
      <div class="col" style="gap: 8px; align-items: center;">
        <div style="width: 14px; height: 14px; border-radius: 2px; background: var(--solar); "></div>
        <div class="col" style="gap: 1px; align-items: center;">
          <span class="token-label" style="font-size: 13px;">Dot</span>
          <span class="token-hex">2px</span>
        </div>
      </div>
    
  </div>
</div>

</body>
</html>
