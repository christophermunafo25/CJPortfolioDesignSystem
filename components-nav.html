<!DOCTYPE html>
<!-- @dsCard group="Components" name="Navigation" subtitle="Pill nav at 20px radius with mark + wordmark + CTAs" viewport="700x130" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Navigation pill</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>

<div class="card" style="padding: 16px; background: var(--linen);">
  <div style="background: var(--paper); border-radius: 20px; box-shadow: 0 4px 80px rgba(35,31,35,0.08); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px;">
    <div class="row" style="gap: 8px; align-items: center; flex-shrink: 0;">
      <img src="../assets/socialpaint-dark.png" alt="Socialpaint" style="height: 22px; width: auto; display: block;">
    </div>
    <div class="row" style="gap: 0; flex-shrink: 1; min-width: 0; overflow: hidden;">
      <a style="font-family: var(--font-body); font-size: 13px; color: var(--ink); opacity: 1; padding: 4px 8px; border-radius: 6px; cursor: pointer; white-space: nowrap;">Home</a><a style="font-family: var(--font-body); font-size: 13px; color: var(--ink); opacity: 0.48; padding: 4px 8px; border-radius: 6px; cursor: pointer; white-space: nowrap;">Features</a><a style="font-family: var(--font-body); font-size: 13px; color: var(--ink); opacity: 0.48; padding: 4px 8px; border-radius: 6px; cursor: pointer; white-space: nowrap;">Integrations</a><a style="font-family: var(--font-body); font-size: 13px; color: var(--ink); opacity: 0.48; padding: 4px 8px; border-radius: 6px; cursor: pointer; white-space: nowrap;">Resources</a><a style="font-family: var(--font-body); font-size: 13px; color: var(--ink); opacity: 0.48; padding: 4px 8px; border-radius: 6px; cursor: pointer; white-space: nowrap;">Pricing</a>
    </div>
    <div class="row" style="gap: 6px; flex-shrink: 0;">
      <button style="background: var(--ink); color: var(--fg-on-dark-1); border: none; padding: 6px 12px; border-radius: 6px; font-family: var(--font-body); font-size: 13px; cursor: pointer; white-space: nowrap;">Sign in</button>
      <button style="background: var(--mesh-warm); color: #fff; border: none; padding: 6px 12px; border-radius: 6px; font-family: var(--font-body); font-size: 13px; cursor: pointer; white-space: nowrap;">Join the waitlist</button>
    </div>
  </div>
</div>

</body>
</html>
