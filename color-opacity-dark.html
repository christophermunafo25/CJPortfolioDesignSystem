<!DOCTYPE html>
<!-- @dsCard group="Colors" name="Opacity on dark" subtitle="Same scale on Obsidian" viewport="700x350" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Opacity on dark</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>

<div class="card dark col" style="gap: 14px;">
  <p class="eyebrow">Foreground opacities · on dark surfaces</p>
  <div class="col" style="gap: 10px;">
    
      <div class="row" style="gap: 14px;">
        <div style="width: 36px; height: 36px; border-radius: 8px; background: #f7f6f5; border: 1px solid var(--hairline-dark); display: grid; place-items: center;"><span style="font-family: var(--font-mono); font-size: 10px; color: var(--ink);">1.00</span></div>
        <div class="col" style="gap: 1px;">
          <span class="token-label" style="font-size: 14px; color: var(--fg-on-dark-1);">Primary text</span>
          <span class="token-hex" style="color: var(--fg-on-dark-3);">#f7f6f5</span>
        </div>
      </div>
    
      <div class="row" style="gap: 14px;">
        <div style="width: 36px; height: 36px; border-radius: 8px; background: rgba(247,246,245,0.64); border: 1px solid var(--hairline-dark); display: grid; place-items: center;"><span style="font-family: var(--font-mono); font-size: 10px; color: var(--ink);">0.64</span></div>
        <div class="col" style="gap: 1px;">
          <span class="token-label" style="font-size: 14px; color: var(--fg-on-dark-1);">Secondary text</span>
          <span class="token-hex" style="color: var(--fg-on-dark-3);">rgba(247,246,245,0.64)</span>
        </div>
      </div>
    
      <div class="row" style="gap: 14px;">
        <div style="width: 36px; height: 36px; border-radius: 8px; background: rgba(247,246,245,0.48); border: 1px solid var(--hairline-dark); display: grid; place-items: center;"><span style="font-family: var(--font-mono); font-size: 10px; color: var(--ink);">0.48</span></div>
        <div class="col" style="gap: 1px;">
          <span class="token-label" style="font-size: 14px; color: var(--fg-on-dark-1);">Tertiary, labels</span>
          <span class="token-hex" style="color: var(--fg-on-dark-3);">rgba(247,246,245,0.48)</span>
        </div>
      </div>
    
      <div class="row" style="gap: 14px;">
        <div style="width: 36px; height: 36px; border-radius: 8px; background: rgba(247,246,245,0.32); border: 1px solid var(--hairline-dark); display: grid; place-items: center;"><span style="font-family: var(--font-mono); font-size: 10px; color: var(--ink);">0.32</span></div>
        <div class="col" style="gap: 1px;">
          <span class="token-label" style="font-size: 14px; color: var(--fg-on-dark-1);">Placeholder, dormant</span>
          <span class="token-hex" style="color: var(--fg-on-dark-3);">rgba(247,246,245,0.32)</span>
        </div>
      </div>
    
      <div class="row" style="gap: 14px;">
        <div style="width: 36px; height: 36px; border-radius: 8px; background: rgba(247,246,245,0.08); border: 1px solid var(--hairline-dark); display: grid; place-items: center;"><span style="font-family: var(--font-mono); font-size: 10px; color: var(--ink);">0.08</span></div>
        <div class="col" style="gap: 1px;">
          <span class="token-label" style="font-size: 14px; color: var(--fg-on-dark-1);">Hairline borders</span>
          <span class="token-hex" style="color: var(--fg-on-dark-3);">rgba(247,246,245,0.08)</span>
        </div>
      </div>
    
  </div>
</div>

</body>
</html>
