<!DOCTYPE html>
<!-- @dsCard group="Components" name="Dark CTA strip" subtitle="Obsidian section with corner halo + two CTAs" viewport="700x280" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dark CTA strip</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>

<div class="card" style="padding: 18px; background: var(--paper);">
  <div style="background: var(--ink); border-radius: 20px; padding: 36px 40px; display: flex; flex-direction: column; gap: 18px; align-items: flex-start; position: relative; overflow: hidden;">
    <div style="position: absolute; right: -120px; top: -60px; width: 360px; height: 240px; background: radial-gradient(50% 50% at 50% 50%, rgba(237,116,114,0.35) 0%, rgba(244,231,199,0.18) 50%, transparent 80%); pointer-events: none;"></div>
    <p class="eyebrow" style="color: var(--fg-on-dark-3); position: relative;">Ready when you are</p>
    <p style="font-family: var(--font-display); font-weight: 400; font-size: 36px; letter-spacing: -0.5px; line-height: 1.1; color: var(--fg-on-dark-1); margin: 0; max-width: 520px; position: relative;">Turn your brand into a content engine.</p>
    <div class="row" style="gap: 10px; position: relative;">
      <button style="background: var(--paper); color: var(--ink); border: none; padding: 12px 20px; border-radius: 8px; font-family: var(--font-body); font-size: 15px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px;">Join the waitlist <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#231f23" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></button>
      <button style="background: rgba(247,246,245,0.08); backdrop-filter: blur(8px); color: var(--fg-on-dark-1); border: none; padding: 12px 20px; border-radius: 8px; font-family: var(--font-body); font-size: 15px; cursor: pointer;">Request early access</button>
    </div>
  </div>
</div>

</body>
</html>
