<!DOCTYPE html>
<!-- @dsCard group="Type" name="Serif italic accent" subtitle="Instrument Serif italic for headline emphasis — sized ~1.15× the sans (--accent-scale)" viewport="820x420" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Serif italic accent</title>
<link rel="stylesheet" href="_card.css">
<style>body { padding: 0; }</style>
</head>
<body>

<div class="card col" style="gap: 28px;">
  <p class="eyebrow">Marketing headlines only · Stack Sans Headline 400 + Instrument Serif italic</p>

  <h2 style="font-size: 56px; letter-spacing: -1px; line-height: 1.04; color: var(--ink); margin: 0;">
    Replicate your team <span class="accent-italic">straight from the source.</span>
  </h2>

  <div class="row" style="gap: 40px; align-items: flex-end; border-top: 1px solid var(--hairline); padding-top: 20px;">
    <div class="col" style="gap: 6px;">
      <span style="font-family: var(--font-display); font-weight: 400; font-size: 44px; line-height: 1; color: var(--ink);">Aa</span>
      <span class="token-hex">Stack Sans Headline · 100px</span>
    </div>
    <div class="col" style="gap: 6px;">
      <span style="font-family: var(--font-accent); font-style: italic; font-weight: 400; font-size: 50px; line-height: 1; color: var(--ink);">Aa</span>
      <span class="token-hex">Instrument Serif italic · 115px (1.15×)</span>
    </div>
    <span class="token-hex" style="margin-left: auto;">--font-accent · --accent-scale · .accent-italic</span>
  </div>
</div>

</body>
</html>
