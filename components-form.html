<!DOCTYPE html>
<!-- @dsCard group="Components" name="Form input" subtitle="Mono label + 10px radius input; focus = darker border" viewport="700x220" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Form input</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>

<div class="card col" style="gap: 18px;">
  <p class="eyebrow">Form input · label + field, focus = darker border</p>
  <div class="col" style="gap: 6px; max-width: 420px;">
    <label style="font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.75px; text-transform: uppercase; color: var(--fg-3);">Work email</label>
    <input type="email" placeholder="you@company.com" style="width: 100%; padding: 12px 16px; border-radius: 10px; background: rgba(35,31,35,0.04); border: 1px solid var(--hairline); color: var(--ink); font-family: var(--font-body); font-size: 16px; font-weight: 300; outline: none;">
  </div>
  <div class="col" style="gap: 6px; max-width: 420px;">
    <label style="font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.75px; text-transform: uppercase; color: var(--fg-3);">Team size</label>
    <input type="text" value="50–250 people" style="width: 100%; padding: 12px 16px; border-radius: 10px; background: var(--lift); border: 1px solid var(--hairline-strong); color: var(--ink); font-family: var(--font-body); font-size: 16px; font-weight: 300; outline: none;">
  </div>
</div>

</body>
</html>
