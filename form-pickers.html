<!DOCTYPE html>
<!-- @dsCard group="Components" name="Form · Pickers" subtitle="Date range · file upload · slider · range" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Date · file · slider</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .field { display: flex; flex-direction: column; gap: 8px; }
  .field > label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.7px; text-transform: uppercase; color: var(--fg-3); }

  /* Date picker */
  .cal { background: var(--lift); border: 1px solid var(--hairline); border-radius: 12px; padding: 14px; box-shadow: var(--shadow-e2); width: 100%; }
  .cal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .cal-title { font-family: var(--font-display); font-size: 14px; font-weight: 500; color: var(--ink); }
  .cal-nav { display: flex; gap: 4px; }
  .cal-nav button { width: 28px; height: 28px; background: transparent; border: 0; border-radius: 6px; cursor: pointer; display: grid; place-items: center; color: var(--fg-2); }
  .cal-nav button:hover { background: var(--paper-warm); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-grid .dow { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.5px; text-transform: uppercase; color: var(--fg-3); text-align: center; padding: 6px 0; }
  .day { font-size: 12px; color: var(--ink); height: 30px; display: grid; place-items: center; border-radius: 6px; cursor: pointer; }
  .day:hover { background: var(--paper-warm); }
  .day.muted { color: var(--fg-4); }
  .day.range { background: rgba(255,63,0,0.10); border-radius: 0; }
  .day.range-start { background: var(--solar); color: #fff; border-radius: 6px 0 0 6px; }
  .day.range-end { background: var(--solar); color: #fff; border-radius: 0 6px 6px 0; }
  .day.today { box-shadow: inset 0 0 0 1px var(--hairline-strong); }

  /* File upload */
  .drop { padding: 24px; border: 1.5px dashed var(--hairline-strong); border-radius: 12px; background: var(--paper); text-align: center; display: flex; flex-direction: column; gap: 8px; align-items: center; transition: all var(--dur-fast) var(--ease-brand); cursor: pointer; }
  .drop:hover { border-color: var(--solar); background: rgba(255,63,0,0.04); }
  .drop.active { border-color: var(--solar); background: rgba(255,63,0,0.06); }
  .drop svg { stroke: var(--fg-2); stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .drop b { font-family: var(--font-display); font-size: 15px; color: var(--ink); font-weight: 500; }
  .drop span { font-size: 12px; color: var(--fg-3); }
  .file-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--lift); border: 1px solid var(--hairline); border-radius: 10px; }
  .file-row .thumb { width: 32px; height: 32px; border-radius: 6px; background: var(--paper-warm); display: grid; place-items: center; flex-shrink: 0; }
  .file-row .name { flex: 1; font-size: 13px; color: var(--ink); }
  .file-row .name small { display: block; font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
  .progress { height: 4px; background: var(--paper-warm); border-radius: 999px; overflow: hidden; margin-top: 4px; }
  .progress > div { height: 100%; background: var(--solar); border-radius: 999px; width: 68%; }

  /* Slider */
  .slider { position: relative; height: 28px; }
  .slider .rail { position: absolute; top: 50%; transform: translateY(-50%); left: 0; right: 0; height: 4px; background: var(--paper-warm); border-radius: 999px; }
  .slider .fill { position: absolute; top: 50%; transform: translateY(-50%); left: 0; height: 4px; background: var(--ink); border-radius: 999px; width: 62%; }
  .slider .thumb { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 18px; height: 18px; border-radius: 999px; background: var(--lift); border: 2px solid var(--ink); box-shadow: var(--shadow-e1); cursor: grab; }
  .slider .thumb { left: 62%; }
  .slider .ticks { position: absolute; bottom: -2px; left: 0; right: 0; display: flex; justify-content: space-between; }
  .slider .ticks span { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }

  /* Range slider */
  .range .fill { left: 22%; width: 40%; }
  .range .thumb-a { left: 22%; }
  .range .thumb-b { left: 62%; }
</style>
</head>
<body>

<div class="card col" style="gap: 22px;">
  <p class="eyebrow">Pickers · date · file · slider</p>

  <div class="grid">
    <div class="field">
      <label>Date range picker</label>
      <div class="cal">
        <div class="cal-head">
          <span class="cal-title">May 2026</span>
          <div class="cal-nav">
            <button><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m15 6-6 6 6 6"/></svg></button>
            <button><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg></button>
          </div>
        </div>
        <div class="cal-grid">
          <div class="dow">S</div><div class="dow">M</div><div class="dow">T</div><div class="dow">W</div><div class="dow">T</div><div class="dow">F</div><div class="dow">S</div>
          <div class="day muted">26</div><div class="day muted">27</div><div class="day muted">28</div><div class="day muted">29</div><div class="day muted">30</div><div class="day">1</div><div class="day">2</div>
          <div class="day">3</div><div class="day">4</div><div class="day">5</div><div class="day">6</div><div class="day">7</div><div class="day">8</div><div class="day">9</div>
          <div class="day">10</div><div class="day">11</div><div class="day range-start">12</div><div class="day range">13</div><div class="day range">14</div><div class="day range">15</div><div class="day range">16</div>
          <div class="day range">17</div><div class="day today range-end">18</div><div class="day">19</div><div class="day">20</div><div class="day">21</div><div class="day">22</div><div class="day">23</div>
          <div class="day">24</div><div class="day">25</div><div class="day">26</div><div class="day">27</div><div class="day">28</div><div class="day">29</div><div class="day">30</div>
        </div>
      </div>
    </div>

    <div class="field">
      <label>File upload</label>
      <div class="drop">
        <svg width="32" height="32" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m17 8-5-5-5 5"/><path d="M12 3v12"/></svg>
        <b>Drop your brand kit here</b>
        <span>PNG, SVG, PDF up to 25 MB · or <u>browse</u></span>
      </div>
      <div class="file-row">
        <div class="thumb">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
        </div>
        <div class="name">brand-guidelines-v3.pdf<small>uploading · 1.4 MB of 2.1 MB</small>
          <div class="progress"><div></div></div>
        </div>
      </div>

      <label style="margin-top: 12px;">Slider</label>
      <div class="slider"><div class="rail"></div><div class="fill"></div><div class="thumb"></div></div>
      <div class="row" style="justify-content: space-between;"><span style="font-size: 12px; color: var(--fg-3);">Creative latitude</span><span style="font-family: var(--font-mono); font-size: 12px; color: var(--ink);">62%</span></div>

      <label style="margin-top: 8px;">Range</label>
      <div class="slider range"><div class="rail"></div><div class="fill"></div><div class="thumb thumb-a"></div><div class="thumb thumb-b"></div></div>
      <div class="row" style="justify-content: space-between;"><span style="font-family: var(--font-mono); font-size: 11px; color: var(--fg-3);">$12k</span><span style="font-family: var(--font-mono); font-size: 11px; color: var(--fg-3);">$28k</span></div>
    </div>
  </div>
</div>

</body>
</html>
