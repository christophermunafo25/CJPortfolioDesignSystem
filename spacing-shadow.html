<!DOCTYPE html>
<!-- @dsCard group="Spacing" name="Shadow scale" subtitle="Rest none → Hover → Dropdown → Card (4 80 / 0.08)" viewport="700x220" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shadow / elevation</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>

<div class="card col" style="gap: 18px;">
  <p class="eyebrow">Shadow · soft, wide, low opacity — only on lift</p>
  <div class="row" style="gap: 28px; flex-wrap: wrap;">
    <div class="col" style="gap: 12px; align-items: center;">
      <div style="width: 140px; height: 88px; background: var(--lift); border-radius: 16px; box-shadow: none; border: 1px solid var(--hairline);"></div>
      <div class="col" style="gap: 1px; align-items: center;"><span class="token-label" style="font-size: 13px;">Rest</span><span class="token-hex">none</span></div>
    </div>
    <div class="col" style="gap: 12px; align-items: center;">
      <div style="width: 140px; height: 88px; background: var(--lift); border-radius: 16px; box-shadow: 0 4px 40px rgba(35,31,35,0.06);"></div>
      <div class="col" style="gap: 1px; align-items: center;"><span class="token-label" style="font-size: 13px;">Hover</span><span class="token-hex">0 4 40 / 0.06</span></div>
    </div>
    <div class="col" style="gap: 12px; align-items: center;">
      <div style="width: 140px; height: 88px; background: var(--lift); border-radius: 16px; box-shadow: 0 4px 40px rgba(35,31,35,0.08);"></div>
      <div class="col" style="gap: 1px; align-items: center;"><span class="token-label" style="font-size: 13px;">Dropdown</span><span class="token-hex">0 4 40 / 0.08</span></div>
    </div>
    <div class="col" style="gap: 12px; align-items: center;">
      <div style="width: 140px; height: 88px; background: var(--lift); border-radius: 16px; box-shadow: 0 4px 80px rgba(35,31,35,0.08);"></div>
      <div class="col" style="gap: 1px; align-items: center;"><span class="token-label" style="font-size: 13px;">Card</span><span class="token-hex">0 4 80 / 0.08</span></div>
    </div>
  </div>
</div>

</body>
</html>
