<!DOCTYPE html>
<!-- @dsCard group="Components" name="Metric cards" subtitle="Dot · label · big number · trend indicator" viewport="700x240" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Metric card</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>

<div class="card col" style="gap: 18px;">
  <p class="eyebrow">Metric card · color dot · big number · trend</p>
  <div class="row" style="gap: 16px;">
    <div style="flex: 1; background: var(--lift); border: 1px solid var(--hairline); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 16px;">
      <div class="row" style="gap: 8px; align-items: center;">
        <span style="width:10px;height:10px;border-radius:2px;background:var(--orchid);"></span>
        <span style="font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.75px; text-transform: uppercase; color: var(--fg-3);">Brand consistency</span>
      </div>
      <p style="font-family: var(--font-display); font-weight: 500; font-size: 32px; letter-spacing: -0.5px; color: var(--ink); margin: 0; line-height: 1;">98.2%</p>
      <div class="row" style="gap: 6px; align-items: center;">
        <span style="font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.4px; color: #4a7c59;">↗ +2.4%</span>
        <span style="font-family: var(--font-body); font-size: 12px; color: var(--fg-3); font-weight: 300;">vs last month</span>
      </div>
    </div>
    <div style="flex: 1; background: var(--lift); border: 1px solid var(--hairline); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 16px;">
      <div class="row" style="gap: 8px; align-items: center;">
        <span style="width:10px;height:10px;border-radius:2px;background:var(--mint);"></span>
        <span style="font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.75px; text-transform: uppercase; color: var(--fg-3);">Assets generated</span>
      </div>
      <p style="font-family: var(--font-display); font-weight: 500; font-size: 32px; letter-spacing: -0.5px; color: var(--ink); margin: 0; line-height: 1;">1,847</p>
      <div class="row" style="gap: 6px; align-items: center;">
        <span style="font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.4px; color: #4a7c59;">↗ +312%</span>
        <span style="font-family: var(--font-body); font-size: 12px; color: var(--fg-3); font-weight: 300;">vs last month</span>
      </div>
    </div>
    <div style="flex: 1; background: var(--lift); border: 1px solid var(--hairline); border-radius: 16px; padding: 20px; display: flex; flex-direction: column; gap: 16px;">
      <div class="row" style="gap: 8px; align-items: center;">
        <span style="width:10px;height:10px;border-radius:2px;background:var(--peach);"></span>
        <span style="font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.75px; text-transform: uppercase; color: var(--fg-3);">Time to first asset</span>
      </div>
      <p style="font-family: var(--font-display); font-weight: 500; font-size: 32px; letter-spacing: -0.5px; color: var(--ink); margin: 0; line-height: 1;">10s</p>
      <div class="row" style="gap: 6px; align-items: center;">
        <span style="font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.4px; color: #4a7c59;">↘ −94%</span>
        <span style="font-family: var(--font-body); font-size: 12px; color: var(--fg-3); font-weight: 300;">vs manual</span>
      </div>
    </div>
  </div>
</div>

</body>
</html>
