<!DOCTYPE html>
<!-- @dsCard group="Components" name="Buttons" subtitle="Primary, ghost, outline, sign-in; inverted on dark" viewport="700x240" -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Buttons</title>
<link rel="stylesheet" href="_card.css">
<style></style>
</head>
<body>

<div class="card col" style="gap: 22px;">
  <p class="eyebrow">Buttons · 8px radius, 14–16px text</p>
  <div class="row wrap" style="gap: 12px;">
    <button style="background: var(--ink); color: var(--fg-on-dark-1); border: none; padding: 12px 20px; border-radius: 8px; font-family: var(--font-body); font-size: 15px; font-weight: 400; cursor: pointer; display: inline-flex; align-items: center; gap: 8px;">Join the waitlist <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#f7f6f5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg></button>
    <button style="background: rgba(35,31,35,0.08); backdrop-filter: blur(8px); color: var(--ink); border: none; padding: 12px 20px; border-radius: 8px; font-family: var(--font-body); font-size: 15px; font-weight: 400; cursor: pointer;">Explore how</button>
    <button style="background: transparent; color: var(--ink); border: 1px solid var(--hairline); padding: 12px 20px; border-radius: 8px; font-family: var(--font-body); font-size: 15px; font-weight: 400; cursor: pointer;">View pricing</button>
    <button style="background: var(--ink); color: var(--fg-on-dark-1); border: none; padding: 8px 16px; border-radius: 8px; font-family: var(--font-body); font-size: 14px; font-weight: 400; cursor: pointer;">Sign in</button>
  </div>
  <div class="row wrap" style="gap: 12px; padding: 16px; border-radius: 12px; background: var(--obsidian);">
    <button style="background: var(--paper); color: var(--ink); border: none; padding: 12px 20px; border-radius: 8px; font-family: var(--font-body); font-size: 15px; font-weight: 400; cursor: pointer;">Explore all products</button>
    <button style="background: rgba(247,246,245,0.08); backdrop-filter: blur(8px); color: var(--fg-on-dark-1); border: none; padding: 12px 20px; border-radius: 8px; font-family: var(--font-body); font-size: 15px; font-weight: 400; cursor: pointer;">Read case study</button>
  </div>
</div>

</body>
</html>
